name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for code changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "force")
          else
            FILES=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only 2>/dev/null || echo "")
          fi
          CODE=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              apps/crawler/data/*) ;;
              apps/crawler/VERSION) ;;
              *.md) ;;
              *) CODE=true; break ;;
            esac
          done <<< "$FILES"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Code changes detected: $CODE"
        env:
          GH_TOKEN: ${{ github.token }}

  lint-web:
    name: Lint Web
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  lint-crawler:
    name: Lint Crawler
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --group dev
        working-directory: apps/crawler

      - run: uv run ruff check src/ tests/
        working-directory: apps/crawler

      - run: uv run ruff format --check src/ tests/
        working-directory: apps/crawler

  test-web:
    name: Test Web
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @jobseek/web test

  test-crawler:
    name: Test Crawler
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: uv sync --group dev
        working-directory: apps/crawler

      - run: uv run pytest tests/ -v
        working-directory: apps/crawler
